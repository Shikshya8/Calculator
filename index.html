<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <!-- Link to our CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">

    <!-- Display area -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">

      <!-- Row 1 -->
      <button class="btn-utility" onclick="clearAll()">AC</button>
      <button class="btn-utility" onclick="toggleSign()">+/-</button>
      <button class="btn-utility" onclick="percentage()">%</button>
      <button class="btn-operator" onclick="chooseOperator('÷')">÷</button>

      <!-- Row 2 -->
      <button class="btn-number" onclick="pressNumber('7')">7</button>
      <button class="btn-number" onclick="pressNumber('8')">8</button>
      <button class="btn-number" onclick="pressNumber('9')">9</button>
      <button class="btn-operator" onclick="chooseOperator('×')">×</button>

      <!-- Row 3 -->
      <button class="btn-number" onclick="pressNumber('4')">4</button>
      <button class="btn-number" onclick="pressNumber('5')">5</button>
      <button class="btn-number" onclick="pressNumber('6')">6</button>
      <button class="btn-operator" onclick="chooseOperator('-')">-</button>

      <!-- Row 4 -->
      <button class="btn-number" onclick="pressNumber('1')">1</button>
      <button class="btn-number" onclick="pressNumber('2')">2</button>
      <button class="btn-number" onclick="pressNumber('3')">3</button>
      <button class="btn-operator" onclick="chooseOperator('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-number btn-zero" onclick="pressNumber('0')">0</button>
      <button class="btn-number" onclick="pressDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>

    </div>
  </div>

  <!-- Link to our JavaScript file (at the bottom so HTML loads first) -->
  <script src="script.js"></script>

</body>
</html>
